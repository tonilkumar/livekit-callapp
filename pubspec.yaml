name: video_call_app
description: "Basic 1:1 video/audio call app built on LiveKit."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Official LiveKit client. Pins flutter_webrtc transitively — do NOT add
  # flutter_webrtc as a direct dependency; version drift breaks native builds.
  livekit_client: ^2.8.1
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  permission_handler: ^12.0.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
